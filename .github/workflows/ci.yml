name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install deps (dashboard + core)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install scikit-learn matplotlib seaborn

      - name: Compile check
        run: |
          python -m py_compile app.py main.py predict.py

      - name: Artifact sanity check
        run: |
          test -f outputs/metrics.txt
          test -f outputs/processed_data.csv
          test -f outputs/anomalies_detected.csv
